<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup - Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family:  sans-serif;
            background: white
            min-height: 150vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 15px black;
            width: 400px;
            padding: 40px;
            top:50px;
position: relative;
        }

       

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 20px;
        }

        .toggle-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            
            
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border:none
            background-color : #f0f0f0;
            cursor: pointer;
            font-size: 16px;
            border-radius: 15px;
            border: 1px solid transparent;
            color:purple;
        }

        .toggle-btn.active {
            background: lightblue;
            color:white;
            border: 1px solid grey;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        button[type="submit"], .btn-submit {
            width: 100%;
            padding: 12px;
            background: blue
            color:white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
       

        .message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Chatbot</h1>
        
        <div class="toggle-buttons">
            <button class="toggle-btn active" onclick="showForm('login')">Login</button>
            <button class="toggle-btn" onclick="showForm('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form active">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button class="btn-submit" onclick="login()">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form">
            <input type="text" id="signupName" placeholder="Full Name" required>
            <input type="email" id="signupEmail" placeholder="Email" required>
            <input type="password" id="signupPassword" placeholder="Password" required>
            <button class="btn-submit" onclick="signup()">Sign Up</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function showForm(type) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const buttons = document.querySelectorAll('.toggle-btn');
            
            if (type === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                signupForm.classList.add('active');
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
            }
            document.getElementById('message').innerHTML = '';
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('message');

            if (!email || !password) {
                messageDiv.innerHTML = '<span class="error">Please fill all fields</span>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // ✅ IMPORTANT: Role save karna
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userRole', data.role);
                    
                    console.log('✅ Login Success!');
                    console.log('Role:', data.role);
                    console.log('Name:', data.name);
                    
                    messageDiv.innerHTML = '<span class="success">Login successful! Redirecting...</span>';
                    
                    setTimeout(() => {
                        if (data.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'chatbot.html';
                        }
                    }, 1000);
                } else {
                    messageDiv.innerHTML = `<span class="error">${data.message}</span>`;
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.innerHTML = '<span class="error">Server error. Please try again.</span>';
            }
        }

        async function signup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const messageDiv = document.getElementById('message');

            if (!name || !email || !password) {
                messageDiv.innerHTML = '<span class="error">Please fill all fields</span>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.innerHTML = '<span class="success">Signup successful! Please login.</span>';
                    setTimeout(() => {
                        showForm('login');
                        document.getElementById('signupName').value = '';
                        document.getElementById('signupEmail').value = '';
                        document.getElementById('signupPassword').value = '';
                    }, 1500);
                } else {
                    messageDiv.innerHTML = `<span class="error">${data.message}</span>`;
                }
            } catch (error) {
                console.error('Signup error:', error);
                messageDiv.innerHTML = '<span class="error">Server error. Please try again.</span>';
            }
        }
    </script>
</body>
</html>
