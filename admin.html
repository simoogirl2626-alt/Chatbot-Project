<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Chatbot Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Two Column Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Chatbot Section */
        .chatbot-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .chatbot-section h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .chat-box {
            border: 1px solid #ddd;
            height: 400px;
            overflow-y: scroll;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #f9f9f9;
        }

        .user {
            text-align: right;
            color: #667eea;
            margin: 10px 0;
        }

        .bot {
            text-align: left;
            color: #4CAF50;
            margin: 10px 0;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .chat-input button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Admin Panel Section */
        .admin-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .admin-section h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .add-form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .add-form input, .add-form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .add-form textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-add {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f5f5f5;
        }

        .edit-btn, .delete-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 3px;
        }

        .edit-btn {
            background: #2196F3;
            color: white;
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }

        .message {
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Admin Dashboard</h1>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>

        <div id="message" class="message"></div>

        <div class="dashboard">
            <!-- Chatbot Section -->
            <div class="chatbot-section">
                <h2>💬 Chatbot Assistant</h2>
                <div class="chat-box" id="chatBox">
                    <div class="bot">Hello! Ask me anything about web development.</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="userInput" placeholder="Type your question..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>

            <!-- Admin Manage Questions Section -->
            <div class="admin-section">
                <h2>🔧 Manage Questions</h2>
                
                <div class="add-form">
                    <h3>➕ Add New Question</h3>
                    <input type="text" id="newQuestion" placeholder="Enter question...">
                    <textarea id="newAnswer" placeholder="Enter answer..."></textarea>
                    <button class="btn-add" onclick="addQuestion()">Add Question</button>
                </div>

                <h3>📋 All Questions</h3>
                <div id="questionsList">
                    <div class="loading">Loading questions...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('userRole');

        // Check authentication
        if (!token) {
            alert('Please login first!');
            window.location.href = 'index.html';
        }

        let questionsDB = [];

        // ============ CHATBOT FUNCTIONS ============
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const userMsg = input.value.trim();
            if (userMsg === "") return;

            const chatBox = document.getElementById('chatBox');
            
            // Display user message
            const userDiv = document.createElement('div');
            userDiv.className = 'user';
            userDiv.innerHTML = `🧑 ${userMsg}`;
            chatBox.appendChild(userDiv);

            // Get answer from backend
            try {
                const response = await fetch(`${API_URL}/questions/search/${encodeURIComponent(userMsg)}`);
                const data = await response.json();
                
                const botDiv = document.createElement('div');
                botDiv.className = 'bot';
                botDiv.innerHTML = `🤖 ${data.answer}`;
                chatBox.appendChild(botDiv);
            } catch (error) {
                const botDiv = document.createElement('div');
                botDiv.className = 'bot';
                botDiv.innerHTML = `🤖 Sorry, something went wrong. Please try again.`;
                chatBox.appendChild(botDiv);
            }

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // ============ ADMIN FUNCTIONS (Manage Questions) ============

        async function loadQuestions() {
            try {
                const response = await fetch(`${API_URL}/admin/questions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const questions = await response.json();
                questionsDB = questions;
                displayQuestions(questions);
            } catch (error) {
                document.getElementById('questionsList').innerHTML = '<div class="loading">Error loading questions</div>';
            }
        }

        function displayQuestions(questions) {
            const container = document.getElementById('questionsList');
            if (questions.length === 0) {
                container.innerHTML = '<div class="loading">No questions found. Add your first question!</div>';
                return;
            }

            let html = `<table><thead><tr><th>ID</th><th>Question</th><th>Answer</th><th>Actions</th></tr></thead><tbody>`;
            questions.forEach(q => {
                html += `<tr>
                    <td>${q.id}</td>
                    <td>${escapeHtml(q.question.substring(0, 50))}${q.question.length > 50 ? '...' : ''}</td>
                    <td>${escapeHtml(q.answer.substring(0, 80))}${q.answer.length > 80 ? '...' : ''}</td>
                    <td>
                        <button class="edit-btn" onclick="editQuestion(${q.id})">✏️ Edit</button>
                        <button class="delete-btn" onclick="deleteQuestion(${q.id})">🗑️ Delete</button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function addQuestion() {
            const question = document.getElementById('newQuestion').value.trim();
            const answer = document.getElementById('newAnswer').value.trim();

            if (!question || !answer) {
                showMessage('Please fill both question and answer', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/questions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ question, answer })
                });

                if (response.ok) {
                    showMessage('Question added successfully!', 'success');
                    document.getElementById('newQuestion').value = '';
                    document.getElementById('newAnswer').value = '';
                    loadQuestions();
                } else {
                    showMessage('Failed to add question', 'error');
                }
            } catch (error) {
                showMessage('Error adding question', 'error');
            }
        }

        async function deleteQuestion(id) {
            if (confirm('Are you sure you want to delete this question?')) {
                try {
                    const response = await fetch(`${API_URL}/admin/questions/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        showMessage('Question deleted successfully!', 'success');
                        loadQuestions();
                    } else {
                        showMessage('Failed to delete question', 'error');
                    }
                } catch (error) {
                    showMessage('Error deleting question', 'error');
                }
            }
        }

        async function editQuestion(id) {
            const question = questionsDB.find(q => q.id === id);
            if (!question) return;

            const newQuestion = prompt('Edit question:', question.question);
            if (!newQuestion) return;
            
            const newAnswer = prompt('Edit answer:', question.answer);
            if (!newAnswer) return;

            try {
                const response = await fetch(`${API_URL}/admin/questions/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ question: newQuestion, answer: newAnswer })
                });

                if (response.ok) {
                    showMessage('Question updated successfully!', 'success');
                    loadQuestions();
                } else {
                    showMessage('Failed to update question', 'error');
                }
            } catch (error) {
                showMessage('Error updating question', 'error');
            }
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Load questions on page load
        loadQuestions();
    </script>
</body>
</html>
